<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        var base = "/dunc-electric";
        var path = window.location.pathname;
        if (path.indexOf(base) === 0) {
          path = path.slice(base.length) || "/";
        }
        window.sessionStorage.setItem("dunc-electric-redirect", path + window.location.search + window.location.hash);
        window.location.replace(base + "/");
      })();
    </script>
  </head>
  <body></body>
</html>
